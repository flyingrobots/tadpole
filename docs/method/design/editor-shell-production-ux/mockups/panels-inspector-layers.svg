<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Contextual layers and inspector panels</title>
  <desc id="desc">Optional layers and inspector panels slide over the canvas while the SVG remains visible.</desc>
  <defs>
    <style>
      .bg { fill: #181a1f; }
      .stage { fill: #111318; stroke: #424a57; }
      .panel { fill: #222731; stroke: #4b5563; }
      .row { fill: #2c3340; stroke: #465161; }
      .text { fill: #eef2f7; font: 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .muted { fill: #aab4c0; font: 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #aab4c0; font: 10px Inter, ui-sans-serif, system-ui, sans-serif; }
      .accent { fill: #2dd4bf; }
      .button { fill: #303846; stroke: #4b5563; }
      .svg { fill: #f8fafc; stroke: #d5dbe5; }
      .select { fill: none; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 5 4; }
    </style>
  </defs>
  <rect class="bg" width="1180" height="680"/>
  <rect class="stage" x="0" y="0" width="1180" height="680"/>
  <rect class="svg" x="332" y="116" width="516" height="322" rx="6"/>
  <text fill="#0f172a" font-size="44" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="700" x="474" y="270">SVG Stage</text>
  <rect class="select" x="454" y="218" width="280" height="78" rx="6"/>

  <rect class="panel" x="24" y="42" width="270" height="596" rx="8"/>
  <text class="text" x="48" y="78">Layers</text>
  <text class="tiny" x="48" y="100">View menu toggles this panel</text>
  <rect class="row" x="44" y="126" width="226" height="38" rx="4"/>
  <text class="text" x="58" y="151">v #logo</text>
  <rect class="row" x="62" y="172" width="208" height="34" rx="4"/>
  <text class="muted" x="76" y="194">#ui  UI Text</text>
  <circle class="accent" cx="250" cy="189" r="5"/>
  <rect class="row" x="62" y="214" width="208" height="34" rx="4"/>
  <text class="muted" x="76" y="236">#q  Tadpole Q</text>
  <rect class="row" x="62" y="256" width="208" height="34" rx="4"/>
  <text class="muted" x="76" y="278">#needle  Group</text>
  <text class="tiny" x="48" y="334">Layer row actions</text>
  <rect class="button" x="48" y="352" width="96" height="28" rx="4"/>
  <text class="tiny" x="64" y="370">Select</text>
  <rect class="button" x="154" y="352" width="96" height="28" rx="4"/>
  <text class="tiny" x="170" y="370">Add track</text>

  <rect class="panel" x="886" y="42" width="270" height="596" rx="8"/>
  <text class="text" x="910" y="78">Inspector</text>
  <text class="tiny" x="910" y="100">Selection details and keyframe edit</text>
  <text class="muted" x="910" y="142">Selected SVG target</text>
  <rect class="row" x="910" y="156" width="220" height="32" rx="4"/>
  <text class="tiny" x="924" y="176">#ui UI Text</text>
  <text class="muted" x="910" y="222">Selected property track</text>
  <rect class="row" x="910" y="236" width="220" height="32" rx="4"/>
  <text class="tiny" x="924" y="256">transform.x</text>
  <text class="muted" x="910" y="302">Active keyframe</text>
  <rect class="row" x="910" y="316" width="104" height="32" rx="4"/>
  <text class="tiny" x="924" y="336">3.00s</text>
  <rect class="row" x="1026" y="316" width="104" height="32" rx="4"/>
  <text class="tiny" x="1040" y="336">48px</text>
  <text class="muted" x="910" y="390">Easing</text>
  <rect class="row" x="910" y="404" width="220" height="32" rx="4"/>
  <text class="tiny" x="924" y="424">power2.out</text>
  <rect class="button" x="910" y="482" width="104" height="30" rx="4"/>
  <text class="tiny" x="932" y="502">Delete key</text>
  <rect class="button" x="1026" y="482" width="104" height="30" rx="4"/>
  <text class="tiny" x="1046" y="502">Duplicate</text>
</svg>
